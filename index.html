<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StockIQ Tutorial</title>
<style>
:root{--teal:#0d9488;--teal-light:#14b8a6;--teal-dim:#0f766e;--bg:#f0faf9;--surface:#fff;--surface2:#e6f7f6;--border:#b2dfdb;--text:#1a2e2d;--muted:#5f8a87;--done:#10b981;--pill-r:999px;--radius:14px;--shadow:0 4px 24px rgba(13,148,136,.10);--shadow-lg:0 12px 48px rgba(13,148,136,.18);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;background:var(--teal);padding:0 2rem;display:flex;align-items:center;gap:1rem;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.15);}
.header-pill{margin-left:auto;background:rgba(255,255,255,.15);color:#fff;font-size:.78rem;font-weight:600;padding:.3rem .9rem;border-radius:var(--pill-r);letter-spacing:.04em;text-transform:uppercase;}
.shell{display:grid;grid-template-columns:260px 1fr;gap:2rem;max-width:1120px;width:100%;padding:2.5rem 1.5rem 4rem;}
.sidebar{position:sticky;top:84px;align-self:start;}
.sidebar-title{font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
.step-nav{display:flex;flex-direction:column;gap:.4rem;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;border-radius:10px;cursor:pointer;transition:background .2s,color .2s;font-size:.9rem;color:var(--muted);border:2px solid transparent;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--surface);color:var(--teal);border-color:var(--border);font-weight:600;box-shadow:var(--shadow);}
.nav-item.completed{color:var(--done);}
.nav-item.completed .nav-num{background:var(--done);color:#fff;}
.nav-num{width:26px;height:26px;border-radius:50%;background:var(--border);color:var(--muted);font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-item.active .nav-num{background:var(--teal);color:#fff;}
.sub-nav{display:flex;flex-direction:column;gap:.25rem;margin-left:1rem;margin-top:.25rem;padding-left:.75rem;border-left:2px solid var(--border);}
.sub-nav-item{display:flex;align-items:center;gap:.5rem;padding:.45rem .75rem;border-radius:8px;cursor:pointer;font-size:.82rem;color:var(--muted);border:1.5px solid transparent;transition:background .2s,color .2s;}
.sub-nav-item:hover{background:var(--surface2);color:var(--text);}
.sub-nav-item.active{background:var(--surface);color:var(--teal);border-color:var(--border);font-weight:600;}
.sub-nav-item.completed{color:var(--done);}
.sub-nav-dot{width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--muted);font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sub-nav-item.active .sub-nav-dot{background:var(--teal);color:#fff;}
.sub-nav-item.completed .sub-nav-dot{background:var(--done);color:#fff;}
.main{min-width:0;}
.step-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);border:1px solid var(--border);overflow:hidden;animation:slideIn .35s cubic-bezier(.4,0,.2,1);}
@keyframes slideIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.card-header{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dim) 100%);padding:2rem 2.5rem 1.6rem;position:relative;overflow:hidden;}
.card-header::after{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07);}
.card-header::before{content:'';position:absolute;right:60px;bottom:-60px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.05);}
.step-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.18);color:#fff;font-size:.72rem;font-weight:600;padding:.28rem .8rem;border-radius:var(--pill-r);margin-bottom:.9rem;letter-spacing:.06em;text-transform:uppercase;}
.card-title{font-size:2rem;font-weight:800;color:#fff;line-height:1.2;position:relative;z-index:1;}
.card-subtitle{color:rgba(255,255,255,.75);margin-top:.5rem;font-size:.95rem;position:relative;z-index:1;}
.card-body{padding:2rem 2.5rem 2.5rem;}
.mockup{background:#0f1e1d;border-radius:10px;margin-bottom:2rem;overflow:hidden;border:1px solid #1a3332;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.mockup-bar{background:#162b2a;padding:.5rem 1rem;display:flex;align-items:center;gap:.4rem;}
.mockup-dot{width:10px;height:10px;border-radius:50%;}
.mockup-dot:nth-child(1){background:#ef4444;}
.mockup-dot:nth-child(2){background:#f59e0b;}
.mockup-dot:nth-child(3){background:#22c55e;}
.mockup-url{margin-left:.6rem;background:#1e3534;border-radius:6px;padding:.2rem .8rem;color:#5f8a87;font-family:monospace;font-size:.72rem;}
.mockup-inner{position:relative;}
.bug-btn{position:absolute;bottom:.5rem;right:.5rem;width:28px;height:28px;background:#0d9488;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;z-index:10;}
.login-mockup{display:flex;flex-direction:column;align-items:center;padding:1.5rem 1.5rem 1rem;gap:.6rem;background:#1a2a3a;}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:.4rem;}
.login-epos-label{color:#8a9bb0;font-size:.78rem;letter-spacing:.04em;margin-top:.2rem;}
.login-card{width:100%;max-width:320px;background:rgba(255,255,255,.08);border-radius:14px;padding:1.5rem;display:flex;flex-direction:column;gap:.8rem;}
.login-card-title{color:#fff;font-weight:700;font-size:1rem;text-align:center;}
.login-card-sub{color:#8a9bb0;font-size:.75rem;text-align:center;margin-top:-.4rem;}
.login-field-wrap{display:flex;flex-direction:column;gap:.25rem;}
.login-field-label{color:#c0cfe0;font-size:.75rem;}
.login-field{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:.6rem .9rem;color:#8a9bb0;font-size:.82rem;}
.login-field.filled{color:#c0cfe0;}
.login-btn{width:100%;background:#4a7ff5;color:#fff;border:none;border-radius:10px;padding:.75rem;font-weight:700;font-size:.9rem;cursor:pointer;margin-top:.2rem;}
.login-footer{color:#5a7a9a;font-size:.7rem;text-align:center;padding-bottom:.5rem;}
.pin-wrap{display:flex;flex-direction:column;align-items:center;padding:1.2rem 1rem 1rem;background:#1a2a3a;gap:.7rem;}
.pin-dots{display:flex;gap:.7rem;margin:.3rem 0;}
.pin-dot{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.18);}
.pin-dot.filled{background:#4a7ff5;border-color:#4a7ff5;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;width:100%;max-width:260px;}
.pin-key{background:#2a3f57;border:none;border-radius:10px;color:#fff;font-size:1.2rem;font-weight:700;padding:.7rem;cursor:pointer;text-align:center;}
.pin-key.clear{background:#7f1d1d;color:#f87171;}
.pin-key.back{background:#78610a;color:#fbbf24;}
.pin-footer{color:#5a7a9a;font-size:.7rem;text-align:center;padding-bottom:.3rem;}
.instr-item.active-instr{border-color:var(--teal);background:var(--surface2);box-shadow:0 0 0 3px rgba(13,148,136,.12);}
.instructions{list-style:none;display:flex;flex-direction:column;gap:.9rem;}
.instr-item{display:flex;gap:1rem;align-items:flex-start;padding:1rem 1.2rem;background:var(--bg);border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:border-color .2s,box-shadow .2s;}
.instr-item:hover{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.08);}
.instr-icon{width:36px;height:36px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;border:1px solid var(--border);}
.instr-text strong{display:block;font-size:.9rem;margin-bottom:.2rem;color:var(--text);}
.instr-text p{font-size:.84rem;color:var(--muted);line-height:1.5;}
.tip-box{margin-top:1.5rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:1rem 1.2rem;display:flex;gap:.75rem;align-items:flex-start;}
.tip-icon{font-size:1.2rem;flex-shrink:0;margin-top:.05rem;}
.tip-box p{font-size:.85rem;color:#92400e;line-height:1.5;}
.stub-box{text-align:center;padding:3rem 2rem;color:var(--muted);}
.stub-box .stub-icon{font-size:2.5rem;margin-bottom:1rem;}
.stub-box h3{font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:.5rem;}
.stub-box p{font-size:.9rem;line-height:1.6;}
.nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;gap:1rem;}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.5rem;border-radius:var(--pill-r);font-size:.9rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.btn-outline{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--teal);color:var(--teal);background:var(--surface2);}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 4px 16px rgba(13,148,136,.3);}
.btn-primary:hover{background:var(--teal-dim);border-color:var(--teal-dim);transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
.complete-screen{text-align:center;padding:3rem 2rem;}
.complete-badge{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--done),var(--teal));display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 1.5rem;box-shadow:0 8px 32px rgba(16,185,129,.3);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.complete-screen h2{font-size:2rem;font-weight:800;margin-bottom:.5rem;color:var(--text);}
.complete-screen p{color:var(--muted);max-width:360px;margin:0 auto 2rem;line-height:1.6;}
.restart-btn{background:transparent;border:2px solid var(--teal);color:var(--teal);padding:.7rem 2rem;border-radius:var(--pill-r);font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;}
.restart-btn:hover{background:var(--teal);color:#fff;}
.sf-panels{display:flex;flex-direction:column;gap:.5rem;margin:.8rem 0 .4rem 2.8rem;}
.sf-toggle{display:none;}
.sf-label{display:flex;align-items:center;gap:.6rem;width:100%;border:2px solid;border-radius:8px;padding:.5rem .8rem;cursor:pointer;font-size:.85rem;font-weight:600;}
.sf-label .arr{margin-left:auto;font-size:.75rem;}
.sf-content{display:none;background:#f8f9fc;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px;padding:.8rem 1rem;font-size:.84rem;color:#444;line-height:1.6;}
.sf-toggle:checked+.sf-label{border-radius:8px 8px 0 0;color:#fff!important;}
.sf-toggle:checked+.sf-label .arr::before{content:'▲';}
.sf-label .arr::before{content:'▼';}
.sf-toggle:checked~.sf-content{display:block;}
.sf-nhs .sf-label{border-color:#1a3a6b;color:#1a3a6b;}
.sf-nhs .sf-toggle:checked+.sf-label{background:#1a3a6b;}
.sf-misc .sf-label{border-color:#4a4a4a;color:#4a4a4a;}
.sf-misc .sf-toggle:checked+.sf-label{background:#4a4a4a;}
.sf-safe .sf-label{border-color:#2e7d32;color:#2e7d32;}
.sf-safe .sf-toggle:checked+.sf-label{background:#2e7d32;}
.sidebar-toggle{display:none;}
@media(max-width:700px){
  .shell{grid-template-columns:1fr;padding:1rem .75rem 3rem;}
  .card-title{font-size:1.4rem;}
  .card-header{padding:1.4rem 1.4rem 1.2rem;}
  .card-body{padding:1.2rem 1.4rem 1.6rem;}
  .sidebar{position:static;width:100%;}
  .sidebar-title{display:none;}
  .sidebar-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--teal);box-shadow:var(--shadow);margin-bottom:.5rem;user-select:none;}
  .sidebar-toggle .arr{transition:transform .25s;}
  .sidebar-toggle.open .arr{transform:rotate(180deg);}
  .step-nav{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1);}
  .step-nav.open{max-height:600px;}
}
</style>
</head>

<script>
var LOGO = '';
var BUG_SVG = '';
var BUG = '';
var BUG_HL = '';

var activeSFPanel = null;
var curStep = 0, curSub = 0, curInstr = 0;
var doneSteps = [], doneSubs = {};

function hl(on) { return on ? 'outline:3px solid #14b8a6;border-radius:7px;background:rgba(20,184,166,.06);' : ''; }
function hlBtn(key) { return activeSFPanel === key ? 'box-shadow:0 0 0 3px #14b8a6;' : ''; }

var SF_PANELS = [
  { key:'nhs',  label:'NHS Services', icon:'&#x1F489;', color:'#1a3a6b', text:'Recording NHS Services such as BP Checks, Flu Jabs (PF), CPCS, and NMS helps build a picture of trends over time - for example, which times of year certain services are busier, or which staff members are particularly good at offering and delivering a specific service. This data helps Head Office plan support and training accordingly.' },
  { key:'misc', label:'Misc Items',   icon:'&#x1F6D2;', color:'#4a4a4a', text:'The Misc Items button lets you manually add a price to any item that scans through with no price attached. This is useful for one-off products or items whose barcode is not yet set up in the system.' },
  { key:'safe', label:'Safe',         icon:'&#x1F512;', color:'#2e7d32', text:'The Safe button has two uses. First, if you have taken a lot of cash during the day and do not want to wait until cash up, you can use it to log a deposit from the till into the in-branch safe at any point during the day. Second, it can also be used to log when cash has been deposited from the in-branch safe into the bank.' }
];

function isDoneStep(i){for(var j=0;j<doneSteps.length;j++){if(doneSteps[j]===i)return true;}return false;}
function isDoneSub(si,sj){if(!doneSubs[si])return false;for(var k=0;k<doneSubs[si].length;k++){if(doneSubs[si][k]===sj)return true;}return false;}
function markDoneStep(i){if(!isDoneStep(i))doneSteps.push(i);}
function markDoneSub(si,sj){if(!doneSubs[si])doneSubs[si]=[];if(!isDoneSub(si,sj))doneSubs[si].push(sj);}

function aStep(){return steps[curStep];}
function aSub(){var s=aStep();return s.subSteps?s.subSteps[curSub]:null;}
function aInstrs(){var sub=aSub();return sub?sub.instructions:aStep().instructions;}
function aTip(){var sub=aSub();return(sub!==null&&sub!==undefined)?sub.tip:aStep().tip;}
function aTip2(){return aStep().tip2||null;}
function aMockup(){var sub=aSub();return sub?sub.getMockup(curInstr):aStep().getMockup(curInstr);}

function goToStep(i){curStep=i;curSub=0;curInstr=0;activeSFPanel=null;render();}
function goToSub(j){curSub=j;curInstr=0;activeSFPanel=null;render();}

function nextInstr(){
  var n=curInstr+1;
  if(n<aInstrs().length){curInstr=n;switchMockup(curInstr);}
  else{advance();}
}

function advance(){
  var s=aStep();
  if(s.subSteps){
    markDoneSub(curStep,curSub);
    if(curSub<s.subSteps.length-1){curSub++;curInstr=0;render();}
    else{markDoneStep(curStep);curStep++;curSub=0;curInstr=0;render();}
  } else {
    markDoneStep(curStep);curStep++;curInstr=0;render();
  }
}

function prevAction(){
  var s=aStep();
  if(s.subSteps){
    if(curSub>0){curSub--;curInstr=0;render();}
    else if(curStep>0){curStep--;var p=steps[curStep];curSub=p.subSteps?p.subSteps.length-1:0;curInstr=0;render();}
  } else {
    if(curStep>0){curStep--;var p=steps[curStep];curSub=p.subSteps?p.subSteps.length-1:0;curInstr=0;render();}
  }
}

function switchMockup(i){
  if(i!==curInstr)activeSFPanel=null;
  curInstr=i;
  var el=document.getElementById('stepMockup');
  if(el){var h=aMockup();el.innerHTML=h;el.style.display=h?'block':'none';}
  var items=document.querySelectorAll('.instr-item');
  for(var j=0;j<items.length;j++){
    if(j===i)items[j].classList.add('active-instr');
    else items[j].classList.remove('active-instr');
  }
  updateInlineBtn();
}

function updateInlineBtn(){
  var btn=document.getElementById('inlineNext');
  if(!btn)return;
  var instrs=aInstrs(),isLast=curInstr>=instrs.length-1;
  var s=aStep(),lastSub=s.subSteps?curSub>=s.subSteps.length-1:true,lastStep=curStep>=steps.length-1;
  btn.textContent=(isLast&&lastSub&&lastStep)?'Finish':isLast?'Next Section':'Next';
}

function sfRender(){
  var panels=document.getElementById('sf-panels');
  if(!panels)return;
  var html='';
  for(var p=0;p<SF_PANELS.length;p++){
    var pn=SF_PANELS[p];
    var open=activeSFPanel===pn.key;
    var md="activeSFPanel=activeSFPanel==='"+pn.key+"'?null:'"+pn.key+"';sfRender();var mk=document.getElementById('stepMockup');if(mk)mk.innerHTML=renderTill(null);";
    html+='<div>';
    html+='<button type="button" onmousedown="'+md+'" style="display:flex;align-items:center;gap:.6rem;width:100%;background-color:'+(open?pn.color:'#fff')+';border:2px solid '+pn.color+';border-radius:'+(open?'8px 8px 0 0':'8px')+';padding:.5rem .8rem;cursor:pointer;text-align:left;">';
    html+='<span style="font-size:1rem;">'+pn.icon+'</span>';
    html+='<span style="font-size:.85rem;font-weight:600;color:'+(open?'#fff':pn.color)+';flex:1;">'+pn.label+'</span>';
    html+='<span style="font-size:.75rem;color:'+(open?'rgba(255,255,255,.7)':pn.color)+';">'+(open?'&#x25B2;':'&#x25BC;')+'</span>';
    html+='</button>';
    if(open){html+='<div style="background:#f8f9fc;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px;padding:.8rem 1rem;font-size:.84rem;color:#444;line-height:1.6;">'+pn.text+'</div>';}
    html+='</div>';
  }
  panels.innerHTML=html;
}

function toggleSidebar(){
  document.getElementById('stepNav').classList.toggle('open');
  document.getElementById('sidebarToggle').classList.toggle('open');
}
function closeMobileNav(){
  if(window.innerWidth<=700){
    document.getElementById('stepNav').classList.remove('open');
    document.getElementById('sidebarToggle').classList.remove('open');
  }
}
function restart(){curStep=0;curSub=0;curInstr=0;doneSteps=[];doneSubs={};activeSFPanel=null;render();}

  var items=[['till','&#x1F9FE;','Till'],['xz','&#x1F4CB;','X/Z Read'],['labels','&#x1F3F7;&#xFE0F;','Labels',true],['dashboard','&#x1F4CA;','Dashboard'],['accounts','&#x1F465;','Accounts'],['reports','&#x1F4C8;','Reports'],['settings','&#x2699;&#xFE0F;','Settings']];

  for(var i=0;i<steps.length;i++){
    var s=steps[i],isActive=i===curStep,isDone=isDoneStep(i);
    html+='<div class="nav-item'+(isActive?' active':'')+(isDone&&!isActive?' completed':'')+'" onclick="goToStep('+i+')">';
    html+='<div class="nav-num">'+(isDone&&!isActive?'&#x2713;':(i+1))+'</div>';
    html+='<span>'+s.title+'</span></div>';
    if(s.subSteps&&isActive){
      html+='<div class="sub-nav">';
      for(var j=0;j<s.subSteps.length;j++){
        var sub=s.subSteps[j],sa=j===curSub,sd=isDoneSub(i,j);
        html+='<div class="sub-nav-item'+(sa?' active':'')+(sd&&!sa?' completed':'')+'" onclick="goToSub('+j+')">';
        html+='<div class="sub-nav-dot">'+(sd&&!sa?'&#x2713;':sub.icon)+'</div>';
        html+='<span>'+sub.title+'</span></div>';
      }
      html+='</div>';
    }
  }
  nav.innerHTML=html;
}

function renderContent(){
  if(curStep>=steps.length){
    return '<div class="step-card"><div class="complete-screen"><div class="complete-badge">&#x1F389;</div><h2>Tutorial Complete!</h2><p>You have successfully covered all sections. You are ready to start using StockIQ in your pharmacy.</p><button class="restart-btn" onclick="restart()">Restart Tutorial</button></div></div>';
  }
  var s=aStep(),sub=aSub(),instrs=aInstrs(),tip=aTip(),tip2=aTip2();
  var mockupHtml=(curStep===0&&curInstr<1)?'':aMockup();
  var title=sub?sub.title:s.title,subtitle=sub?sub.subtitle:s.subtitle;
  var badge=sub?(s.title+' - '+(curSub+1)+' of '+s.subSteps.length+' '+sub.icon):('Step '+(curStep+1)+' of '+steps.length+' '+s.icon);
  var isFirst=curStep===0&&(!s.subSteps||curSub===0);
  var hideBtn=sub&&(sub.title==='Till'||sub.title==='X/Z Read');
  var isLastSub=s.subSteps?curSub>=s.subSteps.length-1:true;
  var isLastStep=curStep>=steps.length-1;
  var isTillSF=sub&&sub.title==='Till'&&curInstr===0;

  var body='';
  if(instrs.length===0){
    body='<div class="stub-box"><div class="stub-icon">'+(sub?sub.icon:s.icon)+'</div><h3>'+title+'</h3><p>Content for this section is coming soon.</p></div>';
  } else {
    body+='<div id="stepMockup" style="display:'+(mockupHtml?'block':'none')+'">'+mockupHtml+'</div>';
    body+='<ul class="instructions">';
    for(var i=0;i<instrs.length;i++){
      body+='<li class="instr-item'+(i===curInstr?' active-instr':'')+'" onclick="switchMockup('+i+')">';
      body+='<div class="instr-icon">'+instrs[i].icon+'</div>';
      body+='<div class="instr-text"><strong>'+instrs[i].title+'</strong><p>'+instrs[i].text+'</p></div></li>';
      if(isTillSF&&i===0){
        body+='<li id="sf-panels" style="list-style:none;display:flex;flex-direction:column;gap:.5rem;padding:.2rem 0 .4rem 2.5rem;"></li>';
      }
    }
    body+='</ul>';
    if(!hideBtn){
      var btnLabel=(curInstr>=instrs.length-1)?(isLastSub&&isLastStep?'Finish':'Next Section'):'Next';
      body+='<div style="display:flex;justify-content:flex-end;margin-top:1rem;"><button id="inlineNext" class="btn btn-primary" onclick="nextInstr()">'+btnLabel+'</button></div>';
    }
    if(tip)body+='<div class="tip-box"><div class="tip-icon">&#x1F4A1;</div><p>'+tip+'</p></div>';
    if(tip2)body+='<div class="tip-box" style="margin-top:.75rem;"><div class="tip-icon">&#x1F4A1;</div><p>'+tip2+'</p></div>';
  }

  var skipLabel=isLastStep&&isLastSub?'Finish':'Skip to Next';
  return '<div class="step-card"><div class="card-header"><div class="step-badge">'+badge+'</div><div class="card-title">'+title+'</div><div class="card-subtitle">'+subtitle+'</div></div><div class="card-body">'+body+'</div></div><div class="nav-btns"><button class="btn btn-outline" onclick="prevAction()"'+(isFirst?' disabled':'')+'>Back</button><button class="btn btn-primary" onclick="advance()">'+skipLabel+'</button></div>';
}

function render(noScroll){
  document.getElementById('mainContent').innerHTML=renderContent();
  renderNav();
  sfRender();
  closeMobileNav();
  if(!noScroll)window.scrollTo({top:0,behavior:'smooth'});
}

window.addEventListener('DOMContentLoaded',function(){
  LOGO=document.getElementById('logo-tpl').innerHTML;
  BUG_SVG=document.getElementById('bug-tpl').innerHTML;
  BUG='<div class="bug-btn">'+BUG_SVG+'</div>';
  BUG_HL='<div class="bug-btn" style="box-shadow:0 0 0 4px #14b8a6,0 2px 8px rgba(0,0,0,.3);transform:scale(1.2);">'+BUG_SVG+'</div>';
  render();
});
</script>
